name: Retrieval Evaluation

on:
  push:
    branches: [main]
    paths:
      - 'implementation/answer.py'
      - 'implementation/ingest.py'
      - 'knowledge-base/**'
      - 'evaluation/**'

jobs:
  evaluate:
    name: Run retrieval metrics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Build vector database
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run python -m implementation.ingest

      - name: Run retrieval evaluation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run python -m evaluation.run_eval

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-results
          path: evaluation/results.json
