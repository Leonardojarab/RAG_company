name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Check syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Check Python syntax
        run: |
          uv run python -m py_compile app.py
          uv run python -m py_compile evaluator.py
          uv run python -m py_compile implementation/answer.py
          uv run python -m py_compile implementation/ingest.py
          uv run python -m py_compile evaluation/eval.py
          uv run python -m py_compile evaluation/test.py
